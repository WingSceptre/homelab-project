version: "3.8"
services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - ./config:/config
    ports:
      - 8052:80 # Panel Heimdall dostępny pod portem 8052
    restart: unless-stopped
